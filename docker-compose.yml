# ============================================================
# docker-compose.yml – health-micro-ai
# Healthcare E-commerce Microservices System
# docker-compose up --build
# ============================================================

services:

  # ── INFRASTRUCTURE ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  neo4j:
    image: neo4j:5.18-community
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH:                          neo4j/health123
      NEO4J_PLUGINS:                       '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── AUTH SERVICE ─────────────────────────────────────────────────────────────

  auth-service:
    build: ./auth-service
    ports:
      - "8012:8000"
    environment:
      JWT_SECRET: "${JWT_SECRET:-health-micro-ai-jwt-secret-key-2024}"
      JWT_EXPIRY_HOURS: "24"
    restart: unless-stopped

  # ── CORE HEALTHCARE SERVICES ──────────────────────────────────────────────────

  patient-service:
    build: ./patient-service
    ports:
      - "8001:8000"
    environment:
      DB_NAME:     patient_db
      DB_USER:     postgres
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      DB_HOST:     postgres
      DB_PORT:     "5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  pharmacy-service:
    build: ./pharmacy-service
    ports:
      - "8002:8000"
    environment:
      DB_NAME:     pharmacy_db
      DB_USER:     postgres
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      DB_HOST:     postgres
      DB_PORT:     "5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  medical-catalog-service:
    build: ./medical-catalog-service
    ports:
      - "8003:8000"
    environment:
      DB_NAME:     medical_catalog_db
      DB_USER:     postgres
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      DB_HOST:     postgres
      DB_PORT:     "5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prescription-service:
    build: ./prescription-service
    ports:
      - "8004:8000"
    environment:
      DB_NAME:     prescription_db
      DB_USER:     postgres
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      DB_HOST:     postgres
      DB_PORT:     "5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dispensing-service:
    build: ./dispensing-service
    ports:
      - "8005:8000"
    environment:
      DB_NAME:                  dispensing_db
      DB_USER:                  postgres
      DB_PASSWORD:              "${DB_PASSWORD:-postgres}"
      DB_HOST:                  postgres
      DB_PORT:                  "5432"
      PRESCRIPTION_SERVICE_URL: "http://prescription-service:8000"
      PATIENT_SERVICE_URL:      "http://patient-service:8000"
    depends_on:
      postgres:
        condition: service_healthy
      prescription-service:
        condition: service_started
    restart: unless-stopped

  medical-review-service:
    build: ./medical-review-service
    ports:
      - "8006:8000"
    environment:
      DB_NAME:     medical_review_db
      DB_USER:     postgres
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      DB_HOST:     postgres
      DB_PORT:     "5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── AI SERVICE (unified chatbot + recommender + knowledge graph) ────────────

  ai-service:
    build: ./ai-service
    ports:
      - "8010:8000"
    env_file:
      - .env
    environment:
      NEO4J_URI:            "bolt://neo4j:7687"
      NEO4J_USER:           neo4j
      NEO4J_PASSWORD:       health123
      PHARMACY_SERVICE_URL: "http://pharmacy-service:8000"
      FAISS_INDEX_PATH:     "/app/faiss_data"
      EMBEDDING_MODEL:      "paraphrase-multilingual-MiniLM-L12-v2"
      GEMINI_API_KEY:       "${GEMINI_API_KEY:-}"
    volumes:
      - ai_faiss_data:/app/faiss_data
      - ai_model_cache:/root/.cache
    depends_on:
      neo4j:
        condition: service_healthy
      pharmacy-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 5
    restart: unless-stopped

  # ── API GATEWAY ───────────────────────────────────────────────────────────────

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET:                    "${JWT_SECRET:-health-micro-ai-jwt-secret-key-2024}"
      AUTH_SERVICE_URL:              "http://auth-service:8000"
      PATIENT_SERVICE_URL:           "http://patient-service:8000"
      PHARMACY_SERVICE_URL:          "http://pharmacy-service:8000"
      MEDICAL_CATALOG_SERVICE_URL:   "http://medical-catalog-service:8000"
      PRESCRIPTION_SERVICE_URL:      "http://prescription-service:8000"
      DISPENSING_SERVICE_URL:        "http://dispensing-service:8000"
      MEDICAL_REVIEW_SERVICE_URL:    "http://medical-review-service:8000"
      CLINICAL_ADVISORY_SERVICE_URL: "http://ai-service:8000"
      TREATMENT_REC_SERVICE_URL:     "http://ai-service:8000"
    volumes:
      - ./api-gateway/db.sqlite3:/app/db.sqlite3
    depends_on:
      - auth-service
      - pharmacy-service
      - patient-service
      - prescription-service
      - dispensing-service
      - medical-review-service
      - ai-service
    restart: unless-stopped

# ── VOLUMES ───────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  ai_faiss_data:
  ai_model_cache:

# ── NETWORKS (default bridge) ─────────────────────────────────────────────────
# Mọi service đều ở cùng default network → có thể giao tiếp qua service name
